# Local end-to-end stack for Phase-2 hosted gstack.
#
#   docker compose up postgres broker            # backend
#   cd gstack-web && npm install && npm run dev  # frontend (separate terminal)
#
# Bring a worker in (requires a gw_ key minted via the web UI or REST):
#   GW=gw_... docker compose up worker
#
# Production deploy is: broker → Fly.io, postgres → Fly Postgres or Supabase,
# frontend → Vercel. See broker/fly.toml and gstack-web/README.md.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     gstack
      POSTGRES_PASSWORD: gstack
      POSTGRES_DB:       gstack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gstack"]
      interval: 5s
      timeout: 3s
      retries: 10

  broker:
    build:
      context: .
      dockerfile: broker/Dockerfile
    environment:
      DATABASE_URL:                postgresql://gstack:gstack@postgres:5432/gstack
      # Leave CLERK_JWKS_URL unset to use the dev-fallback (X-Dev-User-Id).
      # Set it to enable real auth even in compose.
      # CLERK_JWKS_URL:            https://<your>.clerk.accounts.dev/.well-known/jwks.json
      # CLERK_ISSUER:              https://<your>.clerk.accounts.dev
      GSTACK_POOL_AGENTCALL_KEY:   ${AGENTCALL_API_KEY:-}
      PYTHONUNBUFFERED:            "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:8787"

  worker:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - broker
    command: >
      sh -c "pip install --quiet aiohttp websockets &&
             python3 worker.py
             --broker ws://broker:8787/v1/workers/connect
             --key $${GW}
             --name compose-worker"
    environment:
      GW: ${GW:-}
      AGENTCALL_API_KEY: ${AGENTCALL_API_KEY:-}

volumes:
  pgdata:
